<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Visor Leaflet Málaga con GeoJSON</title>

  <!-- Leaflet CSS y JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Plugin Geocoder para buscar direcciones -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <style>
    #map { height: 100vh; }
    .leaflet-control-layers label span { vertical-align: middle; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  var map = L.map('map').setView([36.7213, -4.4214], 13);

  // Crear panes (jerarquía)
  
  map.getPane('markerPane').style.zIndex = 1000;
  [
    'paneZBE','paneZEPCEN','paneZEPCAC','paneZEPSOH',
    'paneSARE','paneTMMALA','paneCAMACEN',
    'paneITINERARIOS','paneBARRIOS','paneDISTRITOS', 'paneCALLESLIM', 'paneMEDICAL', 'paneCARRILBUS', 'paneCARRILBICI', 'paneCARRICICLA', 'paneRESERMOTO', 'paneCARGADESC', 'panePMR', 'paneTAXI'
  ].forEach(p => map.createPane(p));

  // Jerarquía

  map.getPane('paneTMMALA').style.zIndex = 350;           
  map.getPane('paneZBE').style.zIndex = 400;
  map.getPane('paneZEPCEN').style.zIndex = 450;
  map.getPane('paneZEPCAC').style.zIndex = 500;
  map.getPane('paneZEPSOH').style.zIndex = 550;
  map.getPane('paneDISTRITOS').style.zIndex = 570;
  map.getPane('paneBARRIOS').style.zIndex = 575;
  map.getPane('paneSARE').style.zIndex = 600;
  map.getPane('paneCALLESLIM').style.zIndex = 600;
  map.getPane('paneCAMACEN').style.zIndex = 600;
  map.getPane('paneMEDICAL').style.zIndex = 600;
  map.getPane('paneCARRILBUS').style.zIndex = 600;
  map.getPane('paneCARRILBICI').style.zIndex = 600;
  map.getPane('paneRESERMOTO').style.zIndex = 600;
  map.getPane('paneCARGADESC').style.zIndex = 600;
  map.getPane('panePMR').style.zIndex = 600;
  map.getPane('paneTAXI').style.zIndex = 600;
  map.getPane('paneITINERARIOS').style.zIndex = 650;

  // Capas base

  var osm = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution:'© OpenStreetMap contributors', maxZoom:21 }
  ).addTo(map);

  var satelite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution:'Tiles © Esri', maxZoom:21 }
  );

  L.control.layers(
    {"🗺️ Mapa": osm,"🛰️ Satélite": satelite},
    null,
    {collapsed:true,position:'bottomleft'}
  ).addTo(map);

  // Geocoder
  var geocoder = L.Control.geocoder({defaultMarkGeocode:false}).addTo(map);
  var marcadorBusqueda;

  // Eventos generales
 
  function aplicarEventos(layer, nombre, urlFoto = null, descripcion = ''){
    const estiloOriginal = {
      weight: layer.options.weight,
      color: layer.options.color,
      fillOpacity: layer.options.fillOpacity
    };

    layer.on('mouseover',()=>{
      layer.setStyle({weight:5});
      layer.bringToFront();
    });

    layer.on('mouseout',()=>{
      layer.setStyle(estiloOriginal);
    });

    layer.on('click',()=>{
      layer.bringToFront();
    });

    var contenido = "<strong>"+nombre+"</strong>";

    if(descripcion)
      contenido += `<br><em style="font-size:0.9em;color:#555;">${descripcion}</em>`;

    if(urlFoto)
      contenido += `<br><div style="text-align:center;"><img src="${urlFoto}" width="200" style="margin-top:5px; border-radius:5px; border:1px solid #ccc;"></div>`;

    layer.bindPopup(contenido);
  }

  function nombreConSimbologia(nombre,color){
    return `<span style="display:inline-flex;align-items:center;">
      <span style="width:14px;height:14px;background:${color};opacity:0.6;border:2px solid ${color};margin-right:6px;"></span>${nombre}
    </span>`;
  }

  function nombreConLinea(nombre,color,grosor=3){
    return `<span style="display:inline-flex;align-items:center;">
    <span style="width:18px;height:0;border-top:${grosor}px solid ${color};margin-right:6px;"></span>${nombre}
  </span>`;
  }

  function nombreConPunto(nombre,color,tamano=10){
     return `<span style="display:inline-flex;align-items:center;">
     <span style="width:${tamano}px;height:${tamano}px;background:${color};border-radius:50%;display:inline-block;margin-right:6px;border:2px solid white;box-shadow:0 0 0 1px ${color};"></span>${nombre}
  </span>`;
  }

  // Cargar GeoJSON
  
  Promise.all([
    fetch('zbe.geojson').then(r=>r.json()),
    fetch('zepcen.geojson').then(r=>r.json()),
    fetch('zepcac.geojson').then(r=>r.json()),
    fetch('zepsoh.geojson').then(r=>r.json()),
    fetch('SARE.geojson').then(r=>r.json()),
    fetch('tmmala.geojson').then(r=>r.json()),
    fetch('camacen.geojson').then(r=>r.json()),
    fetch('barrios.geojson').then(r=>r.json()),     
    fetch('distrimun.geojson').then(r=>r.json()),
    fetch('itine1.geojson').then(r=>r.json()),
    fetch('itine2.geojson').then(r=>r.json()),
    fetch('itine3.geojson').then(r=>r.json()),
    fetch('itine4.geojson').then(r=>r.json()),
    fetch('itine5.geojson').then(r=>r.json()),
    fetch('itine6.geojson').then(r=>r.json()),
    fetch('itine7.geojson').then(r=>r.json()),
    fetch('itine8.geojson').then(r=>r.json()), 
    fetch('calleslim.geojson').then(r=>r.json()),
    fetch('medical.geojson').then(r=>r.json()),
    fetch('carrilbus.geojson').then(r=>r.json()),
    fetch('carrilbici.geojson').then(r=>r.json()),
    fetch('carricicla.geojson').then(r=>r.json()), 
    fetch('resermoto.geojson').then(r=>r.json()),
    fetch('cargadesc.geojson').then(r=>r.json()),
    fetch('pmr.geojson').then(r=>r.json()),
    fetch('taxi.geojson').then(r=>r.json()),

  ]).then(([zbe,zepcen,zepcac,zepsoh,sare,tmmala,camacen,barrios,distrimun,it1,it2,it3,it4,it5,it6,it7,it8, calleslim, medical, carrilbus, carrilbici, carricicla, resermoto, cargadesc, pmr, taxi])=>{

    // Capas principales

    var capaTMMALA=L.geoJSON(tmmala,{pane:'paneTMMALA',style:{color:'#c25e6d',weight:2,fillOpacity:0},onEachFeature:(f,l)=>aplicarEventos(l,"Término Municipal de Málaga"||'Término Municipal de Málaga')}).addTo(map);
    var capaDISTRITOS=L.geoJSON(distrimun,{pane:'paneDISTRITOS',style:{color:'#555555',weight:2,fillOpacity:0.1},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NOMBRE)});
    var capaBARRIOS=L.geoJSON(barrios,{pane:'paneBARRIOS',style:{color:'#555555',weight:1,fillOpacity:0.1},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NOMBARRIO)});
    var capaZBE=L.geoJSON(zbe,{pane:'paneZBE',style:{color:'#0000ff',weight:2,fillOpacity:0.3},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NOMBRE||'Zona de Bajas Emisiones (ZBE)')}).addTo(map);
  
    // Evento de búsqueda de direcciones
  geocoder.on('markgeocode', function(e) {

  var bbox = e.geocode.bbox;
  var bounds = L.latLngBounds(bbox);

  map.fitBounds(bounds);

  if (map.getZoom() > 17) {
    map.setZoom(17);
  }

  if (marcadorBusqueda) {
    map.removeLayer(marcadorBusqueda);
  }

  marcadorBusqueda = L.marker(e.geocode.center).addTo(map);

  // ---- Comprobar si está dentro de la ZBE ----
  var punto = turf.point([e.geocode.center.lng, e.geocode.center.lat]);
  var dentroZBE = false;

  capaZBE.eachLayer(function(layer){
    if (dentroZBE) return; // optimización
    var poligono = layer.toGeoJSON();
    if (turf.booleanPointInPolygon(punto, poligono)) {
      dentroZBE = true;
    }
  });

  // ---- Comprobar barrio y distrito ----
  var barrio = 'Desconocido';
  var distrito = 'Desconocido';

  capaBARRIOS.eachLayer(function(layer){
    if (barrio !== 'Desconocido') return;
    if (turf.booleanPointInPolygon(punto, layer.toGeoJSON())) {
      barrio = layer.feature.properties?.NOMBARRIO || 'Desconocido';
    }
  });

  capaDISTRITOS.eachLayer(function(layer){
    if (distrito !== 'Desconocido') return;
    if (turf.booleanPointInPolygon(punto, layer.toGeoJSON())) {
      distrito = layer.feature.properties?.NOMBRE || 'Desconocido';
    }
  });

  // ---- Crear popup completo ----
  var popupContenido = `<b>Dirección buscada</b><br>
Barrio: ${barrio}<br>
Distrito: ${distrito}<br>
ZBE: ${dentroZBE ? 'Dentro' : 'Fuera'}`;

  marcadorBusqueda.bindPopup(popupContenido).openPopup();
});

    var capaZEPCEN=L.geoJSON(zepcen,{pane:'paneZEPCEN',style:{color:'#dc3b2c',weight:2,fillOpacity:0.3},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NOMBRE||'Zona de Especial Protección Centro')}).addTo(map);
    var capaZEPCAC=L.geoJSON(zepcac,{pane:'paneZEPCAC',style:{color:'#811c45',weight:2,fillOpacity:0.3},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NOMBRE||'Zona de Especial Protección CAC')}).addTo(map);
    var capaZEPSOH=L.geoJSON(zepsoh,{pane:'paneZEPSOH',style:{color:'#dd4f88',weight:2,fillOpacity:0.3},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NOMBRE||'Zona de Especial Protección SOHO')}).addTo(map);
    var capaSARE=L.geoJSON(sare,{pane:'paneSARE',style:{color:'#335ca2',weight:2,fillOpacity:0.3},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NOMBRE||'SARE')});
    var capaCALLESLIM = L.geoJSON(calleslim,{pane:'paneCALLESLIM',style:{color:'#8a6c26',weight:2,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.CALLE || 'Calles 30')});
    var capaCAMACEN=L.geoJSON(camacen,{pane:'paneCAMACEN',style:{color:'#cc0825',weight:2,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,"Número: "+f.properties.Numero)});
    var capaMEDICAL = L.geoJSON(medical,{pane:'paneMEDICAL',style:{color:'#8a6c26',weight:2,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,f.properties?.NºORDEN)});
    var capaCARRILBUS=L.geoJSON(carrilbus,{pane:'paneCARRILBUS',style:{color:'#6673E5',weight:3,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,f.properties.NOMBRE)});
    var capaCARRILBICI = L.geoJSON(carrilbici,{pane:'paneCARRILBICI',style:{color:'#ee1717',weight:3,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l, "Carril bici")});
    var capaCARRICICLA=L.geoJSON(carricicla,{pane:'paneCARRICICLA',style:{color:'#348e5a',weight:3,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,"Carril ciclable")});
    var capaRESERMOTO=L.geoJSON(resermoto,{pane:'paneRESERMOTO',style:{color:'#428183',weight:5,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,"Plazas: "+f.properties.PLAZAS)});
    var capaCARGADESC=L.geoJSON(cargadesc,{pane:'paneCARGADESC',style:{color:'#f5b62d',weight:5,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,"ID: "+f.properties.ID)});
    var capaPMR=L.geoJSON(pmr,{pane:'panePMR',style:{color:'#2f9ed5',weight:5,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,"ID: "+f.properties.ID)});
    var capaTAXI=L.geoJSON(taxi,{pane:'paneTAXI',style:{color:'#d52f95',weight:5,fillOpacity:1},onEachFeature:(f,l)=>aplicarEventos(l,"ID: "+f.properties.ID)});
    
  function crearItinerario(data,color,nombre,urlFoto,descripcion=''){
      return L.geoJSON(data,{
        pane:'paneITINERARIOS',
        style:{color:color,weight:3},
        onEachFeature:(f,l)=>aplicarEventos(l,nombre,urlFoto,descripcion)
      }).addTo(map);
    }

    var itinerarios=[
      crearItinerario(it1,'#62cd58','Itinerario 1','img/Itinerario_1.jpg', 'Guillén Sotelo, travesía Pintor Nogales, plaza de la Aduana, Císter, San Agustín, Duque de la Victoria, plaza del Siglo, Molina Lario, plaza del Obispo y Molina Lario'),
      crearItinerario(it2,'#62cd58','Itinerario 2','img/Itinerario_2.jpg', 'Martínez, Sancha de Lara, Molina Lario'),
      crearItinerario(it3,'#62cd58','Itinerario 3','img/Itinerario_3.jpg', 'Comedias, Santa Lucía, plaza Jesús de la Pasión, Santa Lucía, Comedias, Nosquera hacia plaza de San Francisco o hacia calle Carretería'),
      crearItinerario(it4,'#62cd58','Itinerario 4','img/Itinerario_4.jpg', 'Méndez Núñez, Casapalma, Cárcer hacia Álamos o Cárcer hacia Madre de Dios'),
      crearItinerario(it5,'#62cd58','Itinerario 5','img/Itinerario_5.jpg', 'Cisneros, Especería, y viceversa para abandonarlo'),
      crearItinerario(it6,'#62cd58','Itinerario 6','img/Itinerario_6.jpg', 'Por Comandante Benítez hacia Navalón y Alemania, y salida hacia Linaje. Desde el Puente de la Misericordia hacia Comandante Benítez, Alemania, y salida desde Alemania hacia Linaje'),
      crearItinerario(it7,'#62cd58','Itinerario 7','img/Itinerario_7.jpeg', 'A este itinerario se accederá desde pasillo Santa Isabel o calle Postigo de Arance hacia calle Carretería y se abandonará por plaza San Francisco o calle Carretería esquina calle Ollerías y también se accederá por calle Álamos esquina calle Puerta Buenaventura y se abandonará por calle Cárcer dirección calle Madre de Dios o por calle Álamos esquina plaza de la Merced'),
      crearItinerario(it8,'#62cd58','Itinerario 8','img/Itinerario_8.jpeg', 'Sebastián Souvirón, Olozaga, Sagasta')
    ];


// Configurar grupos (SIN grupo propio para ZBE)
const grupos=[
  {titulo:'ZONAS DE PROTECCIÓN', capas:[
    {nombre:nombreConSimbologia('Zona de Especial Protección (ZEP) Centro','#dc3b2c'), capa:capaZEPCEN},
    {nombre:nombreConSimbologia('Zona de Especial Protección (ZEP) CAC','#811c45'), capa:capaZEPCAC},
    {nombre:nombreConSimbologia('Zona de Especial Protección (ZEP) SOHO','#dd4f88'), capa:capaZEPSOH}
  ]},
  {titulo:'CENTRO HISTÓRICO', capas:[
    {nombre:nombreConPunto('Control de acceso','#cc0825'), capa:capaCAMACEN},
    {nombre:nombreConLinea('Itinerarios','#62cd58'), capa:L.layerGroup(itinerarios)}
  ]},
  {titulo:'MOVILIDAD', capas:[
    {nombre:nombreConLinea('Calles 30','#8a6c26'), capa:capaCALLESLIM},
    {nombre:nombreConLinea('Carril bici','#ee1717'), capa:capaCARRILBICI},
    {nombre:nombreConLinea('Carril ciclable','#348e5a'), capa:capaCARRICICLA},
    {nombre:nombreConLinea('Carril bus','#6673E5'), capa:capaCARRILBUS},
    {nombre:nombreConPunto('Medidas de calmado','#8a6c26'), capa:capaMEDICAL}
  ]},
  {titulo:'RESERVAS', capas:[
    {nombre:nombreConLinea('SARE','#335ca2'), capa:capaSARE},
    {nombre:nombreConLinea('Moto','#428183'), capa:capaRESERMOTO},
    {nombre:nombreConLinea('Carga y descarga','#f5b62d'), capa:capaCARGADESC}, 
    {nombre:nombreConLinea('PMR','#2f9ed5'), capa:capaPMR},
    {nombre:nombreConLinea('Taxi','#d52f95'), capa:capaTAXI}
  ]},
  {titulo:'LÍMITES', capas:[
    {nombre:nombreConSimbologia('Barrios','#555555'), capa:capaBARRIOS},
    {nombre:nombreConSimbologia('Distritos','#555555'), capa:capaDISTRITOS},
    {nombre:nombreConSimbologia('Término municipal de Málaga','#c25e6d'), capa:capaTMMALA}
  ]}
];

  // Construir overlayMaps en orden
    var overlayMapsOrdered={};

  // 👉 PRIMERO añadimos ZBE como capa independiente
    overlayMapsOrdered[
       nombreConSimbologia('Zona de Bajas Emisiones (ZBE)','#0000ff')
        ] = capaZBE;

  // 👉 DESPUÉS añadimos el resto de grupos
    grupos.forEach(g=>{
       g.capas.forEach(c=> overlayMapsOrdered[c.nombre] = c.capa);
     });

  // Crear control de capas
    var controlCapas = L.control.layers(null, overlayMapsOrdered, {
      collapsed:false,
      position:'topright'
     }).addTo(map);

  // Insertar títulos de subgrupo después de renderizado
    setTimeout(()=>{
      var container = controlCapas.getContainer();
      var overlaysList = container.querySelector('.leaflet-control-layers-overlays');
      if(!overlaysList) return;

  // 👉 1️⃣ Añadir título general "CAPAS"
      var tituloGeneral = document.createElement("div");
        tituloGeneral.innerHTML = "CAPAS";
        tituloGeneral.style.fontWeight = "bold";
        tituloGeneral.style.fontSize = "14px";
        tituloGeneral.style.marginBottom = "8px";
        tituloGeneral.style.borderBottom = "2px solid #ccc";
        tituloGeneral.style.paddingBottom = "4px";

  overlaysList.insertBefore(tituloGeneral, overlaysList.firstChild);

  // 👉 2️⃣ Añadir títulos de subgrupos
  grupos.forEach(g=>{
    var div = document.createElement("div");
    div.style.fontWeight = "bold";
    div.style.marginTop = "8px";
    div.style.marginBottom = "4px";
    div.innerHTML = g.titulo;

    var firstLayerLabel = Array.from(overlaysList.querySelectorAll('label')).find(label=>
      g.capas.some(c=>label.innerHTML.includes(c.nombre))
    );

    if(firstLayerLabel) overlaysList.insertBefore(div, firstLayerLabel);
  });

},0);   

});
</script>
</body>
</html>
